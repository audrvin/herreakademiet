baseURL = "https://audrvin.github.io/herreakademiet/"
locale = 'no-nb'
title = 'Herreakademiets Boganmælderforening'
theme = "sugo"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[taxonomies]
tag = "knagge"
category = "kategorie"
author = "authors"

[menus]
[[menus.main]]
name = 'Hjæm'
pageRef = '/'
weight = 10

[[menus.main]]
name = 'Innlægg'
pageRef = '/post'
weight = 20

[[menus.main]]
name = 'Knagge'
pageRef = '/knagge'
weight = 30

[[menus.main]]
name = 'Kategorie'
pageRef = '/kategorie'
weight = 40

[[menus.main]]
name = 'Arkiv'
pageRef = '/archive'
weight = 50


[[menus.main]]
name = 'Om oss'
pageRef = '/om'
weight = 60

[permalinks]
posts = "/:year/:month/:slug/"

[module]
[module.hugoVersion]
extended = true
min = '0.146.0'

[markup.goldmark.renderer]
unsafe = true

[related]
includeNewer = true
threshold = 80
toLower = true

[[related.indices]]
name = "knagge"
weight = 100

[[related.indices]]
name = "Kategorie"
weight = 70

[[related.indices]]
name = "date"
weight = 10
pattern = "2006"

[params]
paginationSize = 6
summaryLength = 180

[params.features]
enableSearch = true
enableBackToTop = true
enablePagination = true
enableThemeToggle = true
enableMath = true
enableBreadcrumbs = true
enableRelatedPosts = true
fixedThemeWhenToggleOff = "light"

[params.ui]
titleSeparator = " | "
skipLinkText = "Skip to main content"
